name: Release Tauri App

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag name to attach artifacts to (leave empty for build-only test)"
        required: false
        type: string

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
          - platform: macos-latest
            target: x86_64-apple-darwin
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - platform: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libasound2-dev

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: packages/tauri-player/src-tauri -> target

      - run: pnpm install --frozen-lockfile

      - name: Build and upload to release
        if: github.event_name == 'release'
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: packages/tauri-player
          tauriScript: pnpm tauri
          args: --target ${{ matrix.target }}
          releaseId: ${{ github.event.release.id }}

      - name: Build and upload to tagged release
        if: github.event_name == 'workflow_dispatch' && inputs.tag != ''
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: packages/tauri-player
          tauriScript: pnpm tauri
          args: --target ${{ matrix.target }}
          tagName: ${{ inputs.tag }}
          releaseName: ${{ inputs.tag }}

      - name: Build only
        if: github.event_name == 'workflow_dispatch' && inputs.tag == ''
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: packages/tauri-player
          tauriScript: pnpm tauri
          args: --target ${{ matrix.target }}

      - name: Upload artifacts (build-only mode)
        if: github.event_name == 'workflow_dispatch' && inputs.tag == ''
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.target }}
          path: |
            packages/tauri-player/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.dmg
            packages/tauri-player/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.app.tar.gz
            packages/tauri-player/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.deb
            packages/tauri-player/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.AppImage
            packages/tauri-player/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.msi
            packages/tauri-player/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.nsis.exe
