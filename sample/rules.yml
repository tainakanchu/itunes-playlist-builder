namespace: "_Generated"

options:
  removeExistingNamespace: true
  failOnMissingPlaylist: true
  dedupeTrackIds: true
  caseSensitiveContains: false

# Reusable generator templates
templates:
  bpmBuckets:
    type: bpmRange
    from: 70
    to: 180
    step: 5
    pad: 3
    sort:
      - field: bpm
        order: asc
      - field: artist
        order: asc
      - field: name
        order: asc

  # DJ-oriented overlapping BPM zones
  djZones:
    type: ranges
    field: bpm
    pad: 0
    ranges:
      - name: "Slow"
        gte: 70
        lt: 105
      - name: "House"
        gte: 118
        lt: 138
      - name: "Techno"
        gte: 125
        lt: 148
      - name: "Trance"
        gte: 132
        lt: 155
      - name: "DnB"
        gte: 160
        lt: 185
    sort:
      - field: bpm
        order: asc
      - field: artist
        order: asc

playlists:
  # Base favorites: 4 stars and above (rating >= 80)
  - name: "Base/Favorites/4stars+"
    description: "Tracks rated 4 stars or higher"
    match:
      all:
        - field: rating
          gte: 80
        - not:
            field: podcast
            equals: true
    sort:
      - field: artist
        order: asc
      - field: album
        order: asc
      - field: trackNumber
        order: asc

  # 5 stars only
  - name: "Base/Favorites/5stars"
    description: "Tracks rated 5 stars"
    match:
      all:
        - field: rating
          equals: 100
        - not:
            field: podcast
            equals: true
    sort:
      - field: artist
        order: asc
      - field: name
        order: asc

  # Genre playlists
  - name: "Genre/House/All"
    description: "All House genre tracks with 4+ stars"
    match:
      all:
        - inPlaylist:
            source: generated
            name: "Base/Favorites/4stars+"
        - field: genre
          contains: "House"
    sort:
      - field: bpm
        order: asc
      - field: artist
        order: asc

  - name: "Genre/Techno/All"
    description: "All Techno genre tracks with 4+ stars"
    match:
      all:
        - inPlaylist:
            source: generated
            name: "Base/Favorites/4stars+"
        - field: genre
          contains: "Techno"
    sort:
      - field: bpm
        order: asc
      - field: artist
        order: asc

  - name: "Genre/Trance/All"
    description: "All Trance genre tracks with 4+ stars"
    match:
      all:
        - inPlaylist:
            source: generated
            name: "Base/Favorites/4stars+"
        - field: genre
          contains: "Trance"
    sort:
      - field: bpm
        order: asc
      - field: artist
        order: asc

  # High play count
  - name: "Base/HighPlayCount"
    description: "Tracks played more than 10 times"
    match:
      all:
        - field: playCount
          gt: 10
        - not:
            field: podcast
            equals: true
    sort:
      - field: playCount
        order: desc
      - field: artist
        order: asc

generators:
  # BPM buckets reused across multiple sources
  - template: bpmBuckets
    basePath: "BPM/Favorites"
    sourcePlaylist:
      source: generated
      name: "Base/Favorites/4stars+"

  - template: bpmBuckets
    basePath: "Genre/House/BPM"
    sourcePlaylist:
      source: generated
      name: "Genre/House/All"

  - template: bpmBuckets
    basePath: "Genre/Techno/BPM"
    sourcePlaylist:
      source: generated
      name: "Genre/Techno/All"

  - template: bpmBuckets
    basePath: "Genre/Trance/BPM"
    sourcePlaylist:
      source: generated
      name: "Genre/Trance/All"

  # Overlapping DJ zones for favorites
  - template: djZones
    basePath: "DJ/Zones"
    sourcePlaylist:
      source: generated
      name: "Base/Favorites/4stars+"
